<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raio-X do Traidor — Dossiê Confidencial</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="styles.css">
<script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js" defer></script>
<style>
  .dossie-wrap {
    position: relative;
    z-index: 2;
    padding: 24px 16px 80px;
    max-width: 520px;
    margin: 0 auto;
  }

  /* ---- HERO HEADER ---- */
  .dossie-hero {
    background: linear-gradient(135deg, #0d0007 0%, #0a0a0f 100%);
    border: 1px solid rgba(239,35,60,0.25);
    border-top: 3px solid var(--red);
    border-radius: 18px;
    padding: 24px 20px;
    margin-bottom: 16px;
    position: relative;
    overflow: hidden;
  }
  .dossie-hero::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 160px; height: 160px;
    background: radial-gradient(ellipse, rgba(239,35,60,0.12) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
  }
  .dossie-hero-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .dossie-avatar {
    width: 56px; height: 56px;
    border-radius: 50%;
    object-fit: cover;
    border: 2px solid var(--red);
    flex-shrink: 0;
    box-shadow: 0 0 16px rgba(239,35,60,0.3);
  }
  .dossie-avatar-placeholder {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: rgba(239,35,60,0.1);
    border: 2px solid rgba(239,35,60,0.3);
    display: flex; align-items: center; justify-content: center;
    color: var(--red); flex-shrink: 0;
  }
  .dossie-subject-name {
    font-family: 'Manrope', sans-serif;
    font-size: 1.25rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.2;
  }
  .dossie-subject-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.55rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-top: 2px;
  }
  .dossie-meta-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .dossie-meta-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 8px;
    padding: 8px 10px;
  }
  .dossie-meta-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.5rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .dossie-meta-val {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-weight: 500;
  }

  /* ---- SECTION BLOCK ---- */
  .sec-block {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 14px;
  }
  .sec-block.red-accent { border-top: 2px solid var(--red); }
  .sec-block.yellow-accent { border-top: 2px solid var(--yellow); }
  .sec-block.green-accent { border-top: 2px solid var(--green); }
  .sec-title {
    font-family: 'Manrope', sans-serif;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .sec-icon {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: rgba(239,35,60,0.1);
    border: 1px solid rgba(239,35,60,0.2);
    display: flex; align-items: center; justify-content: center;
    color: var(--red); font-size: 0.8rem; flex-shrink: 0;
  }
  .sec-icon.yellow { background: rgba(234,179,8,0.1); border-color: rgba(234,179,8,0.2); color: var(--yellow); }
  .sec-icon.green  { background: rgba(34,197,94,0.1);  border-color: rgba(34,197,94,0.2);  color: var(--green);  }

  /* ---- SCAN DATA GRID ---- */
  .scan-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .scan-stat {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 10px 12px;
    text-align: center;
  }
  .scan-stat-val {
    font-family: 'Roboto Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }
  .scan-stat-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.52rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* ---- FOTO GALERIA ---- */
  .foto-galeria {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr;
    gap: 8px;
    margin-bottom: 14px;
    align-items: stretch;
  }
  .foto-card {
    position: relative;
    border-radius: 12px;
    overflow: hidden;
    aspect-ratio: 1;
    background: rgba(0,0,0,0.3);
  }
  .foto-card img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .foto-card.borrada img {
    filter: blur(8px) brightness(0.45) saturate(0.2);
  }
  .foto-card .foto-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.92) 0%, transparent 100%);
    padding: 10px 6px 6px;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.42rem;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    text-align: center;
  }
  .foto-card .foto-lock-badge {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.15);
  }
  .foto-card .foto-lock-badge span {
    background: rgba(0,0,0,0.75);
    border: 1px solid rgba(239,35,60,0.6);
    border-radius: 4px;
    padding: 4px 8px;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.44rem;
    font-weight: 700;
    color: var(--red);
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }
  .foto-ref-badge {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.7);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 4px;
    padding: 2px 6px;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.4rem;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .evidencia-nota {
    background: rgba(239,35,60,0.06);
    border: 1px solid rgba(239,35,60,0.15);
    border-radius: 10px;
    padding: 10px 12px;
    font-size: 0.74rem;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 14px;
  }
  .evidencia-nota strong { color: var(--text); }

  /* ---- APP STATUS ---- */
  .app-row {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 10px;
    margin-bottom: 8px;
  }
  .app-row:last-child { margin-bottom: 0; }
  .app-row.r-inativo { background: rgba(234,179,8,0.06); border: 1px solid rgba(234,179,8,0.2); }
  .app-row.r-nenhum  { background: rgba(34,197,94,0.05);  border: 1px solid rgba(34,197,94,0.15); }
  .app-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .app-dot.yellow { background: var(--yellow); }
  .app-dot.green  { background: var(--green); }
  .app-name { font-weight: 600; color: var(--text); font-size: 0.82rem; }
  .app-status-text { font-size: 0.7rem; margin-top: 1px; }
  .app-sim { margin-left: auto; font-family: 'Roboto Mono', monospace; font-size: 0.65rem; color: var(--text-dim); flex-shrink: 0; }

  /* ---- SIGNAL CARDS ---- */
  .sig-card {
    border-radius: 14px;
    padding: 16px;
    margin-bottom: 12px;
    border: 1px solid;
    position: relative;
    overflow: hidden;
  }
  .sig-card:last-child { margin-bottom: 0; }
  .sig-card.low      { background: rgba(34,197,94,0.04);  border-color: rgba(34,197,94,0.2);  }
  .sig-card.moderate { background: rgba(234,179,8,0.04);  border-color: rgba(234,179,8,0.2);  }
  .sig-card.elevated { background: rgba(249,115,22,0.05); border-color: rgba(249,115,22,0.25); }
  .sig-card.critical { background: rgba(239,35,60,0.06);  border-color: rgba(239,35,60,0.25); }
  .sig-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .sig-icon-wrap {
    width: 34px; height: 34px;
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .sig-icon-wrap.low      { background: rgba(34,197,94,0.12);  color: var(--green);  }
  .sig-icon-wrap.moderate { background: rgba(234,179,8,0.12);  color: var(--yellow); }
  .sig-icon-wrap.elevated { background: rgba(249,115,22,0.12); color: var(--orange); }
  .sig-icon-wrap.critical { background: rgba(239,35,60,0.12);  color: var(--red);    }
  .sig-top-right { flex: 1; min-width: 0; }
  .sig-name { font-family: 'Manrope', sans-serif; font-size: 0.82rem; font-weight: 700; color: var(--text); line-height: 1.2; }
  .sig-label-small { font-family: 'Roboto Mono', monospace; font-size: 0.5rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.08em; margin-top: 1px; }
  .sig-level {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.48rem;
    padding: 2px 7px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    flex-shrink: 0;
  }
  .sig-level.low      { background: rgba(34,197,94,0.15);  color: var(--green);  }
  .sig-level.moderate { background: rgba(234,179,8,0.15);  color: var(--yellow); }
  .sig-level.elevated { background: rgba(249,115,22,0.15); color: var(--orange); }
  .sig-level.critical { background: rgba(239,35,60,0.15);  color: var(--red);    }
  .sig-bar-wrap {
    height: 3px;
    background: rgba(255,255,255,0.06);
    border-radius: 2px;
    margin-bottom: 10px;
    overflow: hidden;
  }
  .sig-bar-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 1s ease;
  }
  .sig-bar-fill.low      { background: var(--green);  width: 20%; }
  .sig-bar-fill.moderate { background: var(--yellow); width: 50%; }
  .sig-bar-fill.elevated { background: var(--orange); width: 75%; }
  .sig-bar-fill.critical { background: var(--red);    width: 100%; }
  .sig-insight {
    font-size: 0.78rem;
    font-weight: 600;
    color: var(--text);
    padding: 8px 10px;
    border-radius: 8px;
    margin-bottom: 10px;
    line-height: 1.45;
  }
  .sig-insight.low      { background: rgba(34,197,94,0.08);  border-left: 2px solid var(--green);  }
  .sig-insight.moderate { background: rgba(234,179,8,0.08);  border-left: 2px solid var(--yellow); }
  .sig-insight.elevated { background: rgba(249,115,22,0.08); border-left: 2px solid var(--orange); }
  .sig-insight.critical { background: rgba(239,35,60,0.08);  border-left: 2px solid var(--red);    }
  .sig-answer {
    font-size: 0.72rem;
    color: var(--text-dim);
    font-style: italic;
    padding: 5px 8px;
    background: rgba(255,255,255,0.02);
    border-radius: 6px;
    margin-bottom: 8px;
  }
  .sig-interp { font-size: 0.8rem; color: var(--text-muted); line-height: 1.6; }

  /* ---- CONVERGENCE ---- */
  .conv-item {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .conv-item:last-child { border-bottom: none; }
  .conv-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(239,35,60,0.15);
    border: 1px solid rgba(239,35,60,0.3);
    color: var(--red);
    font-family: 'Roboto Mono', monospace;
    font-size: 0.6rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }

  /* ---- PROFILE BLOCK ---- */
  .profile-card-main {
    background: linear-gradient(135deg, rgba(239,35,60,0.06) 0%, rgba(10,10,15,1) 60%);
    border: 1px solid rgba(239,35,60,0.2);
    border-radius: 16px;
    padding: 22px 20px;
    margin-bottom: 14px;
    position: relative;
    overflow: hidden;
  }
  .profile-big-name {
    font-family: 'Manrope', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--text);
    line-height: 1.15;
  }
  .profile-desc-p {
    font-size: 0.85rem;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 12px;
  }
  .profile-desc-p:last-child { margin-bottom: 0; }

  /* ---- ACTION PLAN ---- */
  .action-item {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    padding: 13px 0;
    border-bottom: 1px solid var(--border);
  }
  .action-item:last-child { border-bottom: none; }
  .action-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--red);
    color: #fff;
    font-family: 'Roboto Mono', monospace;
    font-size: 0.62rem;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; margin-top: 1px;
  }
  .action-text { font-size: 0.86rem; color: var(--text); line-height: 1.55; }

  /* ---- UPSELL ---- */
  .upsell-block {
    background: linear-gradient(135deg, rgba(239,35,60,0.06) 0%, var(--bg-card) 100%);
    border: 1px solid rgba(239,35,60,0.25);
    border-radius: 18px;
    padding: 24px 20px;
    margin-bottom: 14px;
  }
  .upsell-checklist { list-style: none; padding: 0; margin: 0; }
  .upsell-checklist li {
    display: flex; gap: 10px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
    font-size: 0.84rem; color: var(--text); line-height: 1.5;
  }
  .upsell-checklist li:last-child { border-bottom: none; }
  .upsell-checklist li::before {
    content: '✓'; color: var(--green); font-weight: 700; font-size: 0.8rem; flex-shrink: 0; margin-top: 1px;
  }

  /* ---- OTO BONUS ---- */
  .oto-bonus {
    background: rgba(255,215,0,0.04);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 14px;
  }

  /* ---- FOOTER ---- */
  .dossie-footer {
    font-size: 0.62rem;
    color: var(--text-dim);
    text-align: center;
    line-height: 1.65;
    margin-top: 32px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
  }

  /* ---- SECTION DIVIDER ---- */
  .sec-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0 14px;
  }
  .sec-divider-line { flex: 1; height: 1px; background: var(--border); }
  .sec-divider-label {
    font-family: 'Roboto Mono', monospace;
    font-size: 0.55rem;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    white-space: nowrap;
  }

  @media print {
    .global-bg, .stars-layer { display:none; }
    body { background: #fff; color: #000; }
    .dossie-wrap { padding: 20px; }
    .btn-cta, .btn-secondary { display: none; }
  }
</style>
</head>
<body>

<!-- BACKGROUND -->
<div class="global-bg">
  <div class="grad-top"></div>
  <div class="red-orb"></div>
  <div class="grid"></div>
</div>
<div class="stars-layer"></div>
<div class="stars-layer"></div>

<div class="dossie-wrap" id="dossieWrap">
  <!-- Filled by JS -->
  <div class="text-center" style="padding:80px 0;">
    <div style="font-family:'Roboto Mono',monospace;font-size:0.7rem;color:var(--text-dim);">Carregando dossiê...</div>
  </div>
</div>

<script>
(function(){

// =================== DATA ===================

var PROFILES = {
  low: {
    name: 'O Parceiro Seguro',
    badge: 'low',
    badgeText: 'Baixo risco',
    riskPct: 12,
    scoreRange: '0–7 pontos',
    description: [
      'O perfil comportamental identificado nesta análise corresponde ao padrão de um parceiro emocionalmente presente e consistente. Os sinais avaliados não indicam duplicidade de comportamento ou ocultamento ativo de informações.',
      'Homens neste perfil tendem a ser previsíveis em sua rotina e emocionalmente acessíveis. Quando surgem distâncias, costumam ter origem em pressões externas — trabalho, saúde, família — e não em envolvimento com terceiros.',
      'A intuição de desconfiança que motivou esta análise pode estar relacionada a inseguranças pessoais, histórico de relacionamentos anteriores ou ansiedade de relacionamento. Isso não invalida seus sentimentos, mas sugere que a conversa mais necessária pode ser sobre comunicação e não sobre infidelidade.',
      'Recomendação: invista em comunicação aberta. Compartilhe seus sentimentos sem acusação. O risco aqui não é traição — é o silêncio que pode criar distância onde não havia nenhuma.'
    ],
    actionPlan: [
      'Inicie uma conversa honesta sobre como você está se sentindo, sem acusações diretas.',
      'Identifique se há gatilhos externos (seu trabalho, família, amigos) que podem estar alimentando a insegurança.',
      'Proponha um ritual de conexão semanal — jantar, passeio, conversa sem celular.',
      'Se a ansiedade persistir, considere suporte psicológico individual. Não é fraqueza — é inteligência emocional.'
    ]
  },
  moderate: {
    name: 'O Descuidado',
    badge: 'moderate',
    badgeText: 'Risco moderado',
    riskPct: 42,
    scoreRange: '8–15 pontos',
    description: [
      'O padrão identificado sugere um distanciamento emocional progressivo com características ambíguas. Este perfil não indica traição ativa confirmada, mas apresenta sinais consistentes com início de envolvimento externo ou insatisfação não comunicada.',
      'O "Descuidado" é o tipo que, muitas vezes, não planeja a traição. Ela começa como uma amizade próxima, uma atenção extra de alguém no trabalho, uma conversa online que vai longe demais. Ele não acorda decidido a trair — mas também não coloca limites quando deveria.',
      'Os sinais que você percebeu são reais. O fato de você estar aqui não é paranoia — é intuição calibrada por comportamentos concretos. A questão é que os dados ainda não são conclusivos o suficiente para um confronto direto.',
      'O próximo passo não é acusar. É observar. E decidir se o padrão se confirma ou se dissolve nas próximas semanas.'
    ],
    actionPlan: [
      'Documente mentalmente (ou por escrito) os comportamentos que te preocuparam. Datas, situações, mudanças específicas.',
      'Observe sem confrontar por 7 a 14 dias. Veja se o padrão continua, se intensifica ou se a situação tem outra explicação.',
      'Abra uma conversa sobre o relacionamento em geral — não sobre traição. "Tenho sentido distância entre nós, quero entender o que está acontecendo."',
      'Se os sinais persistirem, uma segunda análise com dados atualizados pode ser determinante antes de qualquer decisão.'
    ]
  },
  elevated: {
    name: 'O Duplo',
    badge: 'elevated',
    badgeText: 'Risco elevado',
    riskPct: 72,
    scoreRange: '16–22 pontos',
    description: [
      'A convergência de sinais identificados nesta análise aponta para um padrão comportamental consistente com manutenção de vida dupla. "O Duplo" não é alguém que desliza ocasionalmente — é alguém que gerencia ativamente duas versões de si mesmo.',
      'Ele sabe o que está fazendo. A proteção excessiva do celular, a alteração dos padrões de saída, a frieza emocional com você enquanto mantém a aparência de normalidade — tudo isso exige esforço consciente. Não é descuido. É gestão.',
      'A boa notícia cruel: você não está ficando louca. A má notícia: a negação, se vier, será convincente e agressiva. Ele praticou. Está preparado para a conversa que você ainda não teve.',
      'Você não precisa de mais provas para validar seus sentimentos. Mas precisa de estratégia para o próximo passo — seja ele a confrontação, a saída ou a decisão de buscar evidências concretas antes de agir.'
    ],
    actionPlan: [
      'Não confronte sem estratégia. Um confronto mal preparado dá a ele tempo para desmontar evidências e consolidar a narrativa de negação.',
      'Documente tudo que for possível — prints de conversas, horários, mudanças de comportamento — antes de qualquer conversa direta.',
      'Decida o que você quer: a verdade nua ou a manutenção do relacionamento. Esses caminhos exigem abordagens diferentes.',
      'Busque suporte emocional antes do confronto. Amiga de confiança, terapeuta ou grupo de apoio. Você vai precisar de âncoras.',
      'Após o confronto, independente da resposta dele, tenha um plano B: onde você vai, o que você vai fazer, quem vai te ajudar.'
    ]
  },
  critical: {
    name: 'O Arquiteto',
    badge: 'critical',
    badgeText: 'Risco crítico',
    riskPct: 91,

function getScore() {
  var score = 0;
  for(var i = 1; i <= 10; i++){
    var v = parseInt(localStorage.getItem('q' + i));
    if(!isNaN(v)) score += v;
  }
  var tb = parseInt(localStorage.getItem('qtb'));
  if(!isNaN(tb)) score += tb;
  return score;
}

  if(score <= 7)  return 'low';

  if(score <= 22) return 'elevated';
  return 'critical';
}

function rnd(min, max) {
  return Math.floor(Math.random() * (max - min + 1)) + min;
}

function rndFloat(min, max, dec) {
  return (Math.random() * (max - min) + min).toFixed(dec);
}

function generateProtocol() {
  var n = '';
  for(var i = 0; i < 8; i++) n += Math.floor(Math.random()*10);
  return n;
}

function formatDateTime() {
  var d = new Date();
  var day = ('0'+d.getDate()).slice(-2);
  var mon = ('0'+(d.getMonth()+1)).slice(-2);
  var yr  = d.getFullYear();
  var hr  = ('0'+d.getHours()).slice(-2);
  var min = ('0'+d.getMinutes()).slice(-2);
  return day + '/' + mon + '/' + yr + ' ' + hr + ':' + min;
}

function getSignalClass(v) {
  if(v === 0) return 'low';
  if(v === 1) return 'moderate';
  if(v === 2) return 'elevated';
  return 'critical';
}

var pKey     = sessionStorage.getItem('profileKey') || getProfileKey(score);
var profile  = PROFILES[pKey] || PROFILES['moderate'];
var foto     = sessionStorage.getItem('foto_base64');
var comprou  = sessionStorage.getItem('comprou_oto1') === 'true';
var protocol = generateProtocol();
var datetime = formatDateTime();

var answers  = [];
for(var qi = 1; qi <= 10; qi++) answers.push(getAnswer(qi));

// Top 3 signals by score
var signalScores = answers.map(function(v,i){ return {idx:i, v:v}; });
signalScores.sort(function(a,b){ return b.v - a.v; });
var top3 = signalScores.slice(0,3);

// Scan data
var platformList = ['Badoo','Meetic','ParPerfeito','OkCupid','Lovoo','Plenty of Fish','Happn','Once'];
var profilesFound = pKey==='low' ? 0 : pKey==='moderate' ? rnd(0,1) : pKey==='elevated' ? 1 : rnd(1,2);
var foundPlatforms = [];
for(var pi=0; pi<profilesFound; pi++){
  var pIdx = rnd(0, platformList.length-1);
  if(foundPlatforms.indexOf(platformList[pIdx])===-1) foundPlatforms.push(platformList[pIdx]);
}

// Nome do suspeito
var nomeSuspeito = sessionStorage.getItem('nome_suspeito') || '';
var N = nomeSuspeito ? nomeSuspeito : 'o analisado';
var Ncap = nomeSuspeito ? nomeSuspeito.charAt(0).toUpperCase() + nomeSuspeito.slice(1) : 'O analisado';

// Fotos extras borradas
var extraNums = [];
while(extraNums.length < 2) {
  var en = rnd(1, 70);
  if(extraNums.indexOf(en) === -1) extraNums.push(en);
}

// =================== BUILD HTML ===================

function buildHeader() {
  var avatarHtml = foto
    ? '<img src="' + foto + '" class="dossie-avatar" alt="' + Ncap + '">'
    : '<div class="dossie-avatar-placeholder"><iconify-icon icon="lucide:user" width="24"></iconify-icon></div>';

  var classColor = pKey==='low'?'green': pKey==='moderate'?'yellow': pKey==='elevated'?'orange':'red';

  return (
    '<div class="dossie-hero mb-16">' +
      '<div style="font-family:\'Roboto Mono\',monospace;font-size:0.55rem;color:var(--red);letter-spacing:0.16em;text-transform:uppercase;margin-bottom:14px;text-align:center;">Raio-X do Traidor — Dossiê Confidencial</div>' +
      '<div class="dossie-hero-top">' +
        avatarHtml +
        '<div>' +
          '<div class="dossie-subject-label">Sujeito analisado</div>' +
          '<div class="dossie-subject-name">' + Ncap + '</div>' +
          '<div style="margin-top:6px;"><span class="risk-badge ' + pKey + '">' + profile.badgeText + '</span></div>' +
        '</div>' +
      '</div>' +
      '<div class="dossie-meta-grid">' +
        '<div class="dossie-meta-item"><div class="dossie-meta-label">Protocolo</div><div class="dossie-meta-val">#' + protocol + '</div></div>' +
        '<div class="dossie-meta-item"><div class="dossie-meta-label">Data/Hora</div><div class="dossie-meta-val">' + datetime + '</div></div>' +
        '<div class="dossie-meta-item"><div class="dossie-meta-label">Pontuação</div><div class="dossie-meta-val" style="color:var(--' + classColor + ');">' + score + ' / 33</div></div>' +
        '<div class="dossie-meta-item"><div class="dossie-meta-label">Sinais analisados</div><div class="dossie-meta-val">10 de 10</div></div>' +
      '</div>' +
    '</div>'
  );
}

function buildScanReport() {
  var simPct = rnd(87,97);
  var perfilStatusHtml = (pKey==='low')
    ? '<span style="color:var(--green);">Sem registros</span>'
    : (pKey==='moderate')
      ? '<span style="color:var(--green);">Sem perfis ativos</span>'
      : '<span style="color:var(--yellow);">Contas inativas detectadas</span>';

  return (
    '<div class="sec-block mb-14">' +
      '<div class="sec-title">' +
        '<div class="sec-icon"><iconify-icon icon="lucide:scan" width="14"></iconify-icon></div>' +
        'Varredura Digital' +
      '</div>' +
      '<div class="scan-grid">' +
        '<div class="scan-stat"><div class="scan-stat-val">' + rnd(847,1243) + '</div><div class="scan-stat-label">Plataformas</div></div>' +
        '<div class="scan-stat"><div class="scan-stat-val">' + rndFloat(2.1,4.8,1) + 'M</div><div class="scan-stat-label">Imgs indexadas</div></div>' +
        '<div class="scan-stat"><div class="scan-stat-val">' + simPct + '%</div><div class="scan-stat-label">Similaridade máx.</div></div>' +
        '<div class="scan-stat"><div class="scan-stat-val">60s</div><div class="scan-stat-label">Tempo varredura</div></div>' +
      '</div>' +
      '<div style="margin-top:12px;font-family:\'Roboto Mono\',monospace;font-size:0.6rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.08em;">Status em apps &nbsp;→&nbsp; ' + perfilStatusHtml + '</div>' +
    '</div>'
  );
}

function buildEvidenciaGaleria() {
  var foto1Html = foto
    ? '<div class="foto-card">' +
        '<img src="' + foto + '" alt="' + Ncap + '">' +
        '<div class="foto-ref-badge">REF.</div>' +
        '<div class="foto-overlay">' + Ncap + ' · Foto enviada</div>' +
      '</div>'
    : '<div class="foto-card" style="background:rgba(239,35,60,0.06);border:1px solid rgba(239,35,60,0.2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;">' +
        '<iconify-icon icon="lucide:user" width="28" style="color:var(--red);opacity:0.4;"></iconify-icon>' +
        '<span style="font-family:\'Roboto Mono\',monospace;font-size:0.4rem;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.1em;">Sem foto</span>' +
      '</div>';

  var locais = ['Tinder', 'Badoo', 'Instagram', 'Badoo', 'Happn', 'Facebook'];
  var foto2Html =
    '<div class="foto-card borrada">' +
      '<img src="https://randomuser.me/api/portraits/men/' + extraNums[0] + '.jpg" alt="">' +
      '<div class="foto-lock-badge"><span>RESTRITO</span></div>' +
      '<div class="foto-overlay">' + locais[Math.floor(Math.random()*3)] + ' · ' + rnd(86,97) + '% sim.</div>' +
    '</div>';

  var foto3Html =
    '<div class="foto-card borrada">' +
      '<img src="https://randomuser.me/api/portraits/men/' + extraNums[1] + '.jpg" alt="">' +
      '<div class="foto-lock-badge"><span>RESTRITO</span></div>' +
      '<div class="foto-overlay">' + locais[Math.floor(Math.random()*3)+3] + ' · ' + rnd(84,95) + '% sim.</div>' +
    '</div>';

  var appDefs = [
    { name: 'Tinder',  icon: 'simple-icons:tinder',  color: '#FE3C72' },
    { name: 'Badoo',   icon: 'simple-icons:badoo',   color: '#6A35C2' },
    { name: 'Meetic',  icon: 'lucide:heart',          color: '#E8003D' },
    { name: 'Happn',   icon: 'lucide:map-pin',        color: '#01AAED' }
  ];

  var appsHtml = '';
  if(pKey === 'low') {
    appsHtml =
      '<div class="app-row r-nenhum">' +
        '<div class="app-dot green"></div>' +
        '<div>' +
          '<div class="app-name">Nenhum perfil localizado</div>' +
          '<div class="app-status-text" style="color:var(--text-muted);">Varredura em Tinder, Badoo, Happn, Meetic e 800+ plataformas — sem registros associados a ' + N + '.</div>' +
        '</div>' +
      '</div>';
  } else if(pKey === 'moderate') {
    appsHtml =
      '<div class="app-row r-nenhum">' +
        '<div class="app-dot green"></div>' +
        '<div>' +
          '<div class="app-name">Sem contas ativas encontradas</div>' +
          '<div class="app-status-text" style="color:var(--text-muted);">Nenhum perfil ativo de ' + N + ' foi localizado. Isso não exclui contas com dados alterados ou perfis deletados recentemente.</div>' +
        '</div>' +
      '</div>';
  } else {
    appsHtml = appDefs.map(function(app){
      var dayAgo = rnd(2, 18);
      var sim = rnd(86, 97);
      var statusText = pKey === 'critical'
        ? 'Perfil ativo detectado &bull; último acesso há ' + dayAgo + ' dias'
        : 'Conta criada &bull; inativa no momento';
      var statusColor = pKey === 'critical' ? 'var(--red)' : 'var(--yellow)';
      var dotCls = pKey === 'critical' ? 'yellow' : 'yellow';
      return (
        '<div class="app-row r-inativo">' +
          '<div class="app-dot ' + dotCls + '" style="' + (pKey==='critical' ? 'background:var(--red);animation:pulseDot 1.2s ease-in-out infinite;' : '') + '"></div>' +
          '<div style="flex:1;">' +
            '<div class="app-name">' + app.name + '</div>' +
            '<div class="app-status-text" style="color:' + statusColor + ';">' + statusText + '</div>' +
          '</div>' +
          '<div class="app-sim">' + sim + '% sim.</div>' +
        '</div>'
      );
    }).join('');
  }

  var galeriaTitle = (pKey==='elevated'||pKey==='critical') ? 'Registros Encontrados' : 'Varredura de Imagem';

  var notaHtml = (pKey==='low')
    ? '<div class="evidencia-nota">A varredura cruzou a imagem enviada com <strong>Tinder, Badoo, Happn, Meetic</strong> e 800+ plataformas indexadas. <strong>Nenhum registro ativo foi localizado</strong> associado ao rosto de ' + Ncap + '.</div>'
    : (pKey==='moderate')
    ? '<div class="evidencia-nota">A imagem foi processada e cruzada com as principais plataformas. <strong>Nenhum perfil ativo foi encontrado</strong> — isso não descarta contas com dados alterados ou excluídas recentemente.</div>'
    : '<div class="evidencia-nota" style="border-color:rgba(239,35,60,0.3);background:rgba(239,35,60,0.08);">A varredura identificou <strong style="color:var(--red);">correspondências acima do limiar de alerta</strong> em múltiplas plataformas. Os registros completos estão listados abaixo.</div>';

  return (
    '<div class="sec-block red-accent mb-14">' +
      '<div class="sec-title">' +
        '<div class="sec-icon"><iconify-icon icon="lucide:camera" width="14"></iconify-icon></div>' +
        galeriaTitle +
      '</div>' +
      notaHtml +
      '<div class="foto-galeria">' + foto1Html + foto2Html + foto3Html + '</div>' +
      '<div class="sec-divider"><div class="sec-divider-line"></div><div class="sec-divider-label">Status em apps de relacionamento</div><div class="sec-divider-line"></div></div>' +
      appsHtml +
    '</div>'
  );

function buildSignals() {
  var rows = answers.map(function(v, i){
    var sig = SIGNAL_DATA[i];
    var cls = getSignalClass(v);
    var levelText = v===0?'Baixo': v===1?'Moderado': v===2?'Elevado':'Crítico';
    var txt = getAnswerText(i, v);
    var interp = sig.interps[v].replace(/\b(ele|o parceiro|o sujeito)\b/gi, N);
    var insightTxt = sig.insight[v];
    return (
      '<div class="sig-card ' + cls + '">' +
        '<div class="sig-card-top">' +
          '<div class="sig-icon-wrap ' + cls + '">' +
            '<iconify-icon icon="' + sig.icon + '" width="16"></iconify-icon>' +
          '</div>' +
          '<div class="sig-top-right">' +
            '<div class="sig-name">' + sig.name + '</div>' +
            '<div class="sig-label-small">' + sig.label + '</div>' +
          '</div>' +
          '<span class="sig-level ' + cls + '">' + levelText + '</span>' +
        '</div>' +
        '<div class="sig-bar-wrap"><div class="sig-bar-fill ' + cls + '"></div></div>' +
        '<div class="sig-insight ' + cls + '">' + insightTxt + '</div>' +
        '<div class="sig-answer">Você respondeu: "' + txt + '"</div>' +
        '<div class="sig-interp">' + interp + '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="sec-block mb-14">' +
      '<div class="sec-title">' +
        '<div class="sec-icon"><iconify-icon icon="lucide:list-checks" width="14"></iconify-icon></div>' +
        'Análise dos 10 Sinais' +
      '</div>' +
      rows +
    '</div>'
  );
}

function buildTop3() {
  var convergenceScore = Math.round((top3.reduce(function(a,s){return a+s.v;},0) / 9) * 100);
  var items = top3.map(function(s, idx){
    var sig = SIGNAL_DATA[s.idx];
    var cls = getSignalClass(s.v);
    var interp = sig.interps[s.v].replace(/\b(ele|o parceiro|o sujeito)\b/gi, N);
    return (
      '<div class="conv-item">' +
        '<div class="conv-num">' + (idx+1) + '</div>' +
        '<div>' +
          '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
            '<span class="risk-badge ' + cls + '" style="font-size:0.5rem;">' + (s.v===3?'Crítico':s.v===2?'Elevado':s.v===1?'Moderado':'Baixo') + '</span>' +
            '<span style="font-family:\'Manrope\',sans-serif;font-size:0.8rem;font-weight:700;color:var(--text);">' + sig.name + '</span>' +
          '</div>' +
          '<div style="font-size:0.77rem;color:var(--text-muted);line-height:1.5;">' + interp.substring(0,130) + '…</div>' +
        '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="sec-block" style="background:rgba(239,35,60,0.05);border:1px solid rgba(239,35,60,0.18);border-radius:16px;padding:20px;margin-bottom:14px;">' +
      '<div class="sec-title" style="color:var(--red);">' +
        '<div class="sec-icon"><iconify-icon icon="lucide:zap" width="14"></iconify-icon></div>' +
        'Top 3 — Convergência Crítica' +
      '</div>' +
      items +
      '<div style="margin-top:14px;padding:12px;background:rgba(239,35,60,0.06);border-radius:10px;font-size:0.8rem;color:var(--text-muted);line-height:1.55;">' +
        '<strong style="color:var(--red);">' + convergenceScore + '% de convergência</strong> — Estes três sinais combinados formam o núcleo diagnóstico da análise de ' + Ncap + '. A presença simultânea deles eleva significativamente a precisão do resultado.' +
      '</div>' +
    '</div>'
  );
}

function buildProfile() {
  var descHtml = profile.description.map(function(p){
    var txt = p.replace(/\b(ele|o parceiro|o sujeito)\b/gi, N);
    return '<p class="profile-desc-p">' + txt + '</p>';
  }).join('');

  var actItems = profile.actionPlan.map(function(step, i){
    return (
      '<div class="action-item">' +
        '<div class="action-num">' + (i+1) + '</div>' +
        '<div class="action-text">' + step + '</div>' +
      '</div>'
    );
  }).join('');

  return (
    '<div class="profile-card-main mb-14">' +
      '<div style="margin-bottom:12px;">' +
        '<span class="risk-badge ' + profile.badge + '">' + profile.badgeText + '</span>' +
      '</div>' +
      '<div class="profile-name-wrap" style="margin-bottom:6px;">' +
        '<span class="profile-big-name typewriter" id="memberProfileName"></span>' +
        '<div class="profile-name-underline" id="memberNameUnderline"></div>' +
      '</div>' +
      '<div style="font-family:\'Roboto Mono\',monospace;font-size:0.58rem;color:var(--text-dim);margin-bottom:16px;">' + profile.scoreRange + '</div>' +
      '<div class="risk-track mb-20"><div class="risk-marker" id="memberRiskMarker" style="left:5%;"></div></div>' +
      descHtml +
    '</div>' +
    '<div class="sec-block mb-14">' +
      '<div class="sec-title">' +
        '<div class="sec-icon"><iconify-icon icon="lucide:clipboard-list" width="14"></iconify-icon></div>' +
        'Plano de Ação — ' + Ncap +
      '</div>' +
      actItems +
    '</div>'
  );
}

function buildOtoBonus() {
  if(!comprou) return '';
  return (
    '<div class="oto-bonus mb-14">' +
      '<div class="sec-title" style="color:var(--gold);">' +
        '<div class="sec-icon yellow"><iconify-icon icon="lucide:star" width="14"></iconify-icon></div>' +
        'Monitoramento 30 Dias — Ativação' +
      '</div>' +
      '<p style="font-size:0.82rem;color:var(--text-muted);line-height:1.6;margin-bottom:12px;">Parabéns por garantir o Monitoramento Contínuo. Veja como ativar:</p>' +
      '<div class="action-item"><div class="action-num" style="background:var(--gold);color:#000;">1</div><div class="action-text">Você receberá um e-mail de confirmação em até 24h com acesso ao painel de monitoramento.</div></div>' +
      '<div class="action-item"><div class="action-num" style="background:var(--gold);color:#000;">2</div><div class="action-text">Configure os alertas de e-mail no painel para ser notificada imediatamente sobre qualquer nova atividade detectada.</div></div>' +
      '<div class="action-item"><div class="action-num" style="background:var(--gold);color:#000;">3</div><div class="action-text">Relatórios semanais chegarão todo domingo às 08h com resumo das variações de padrão digital de ' + N + '.</div></div>' +
      '<div class="action-item"><div class="action-num" style="background:var(--gold);color:#000;">4</div><div class="action-text">Em caso de mudança crítica detectada, você receberá uma notificação de emergência com orientações específicas.</div></div>' +
    '</div>'
  );
}

function buildUpsellBlock() {

    ? 'Mesmo com resultado tranquilizador, sentimentos não resolvidos precisam de espaço. A conversa certa, na hora certa, pode transformar insegurança em conexão real.'
    : 'Você vai precisar conversar com ' + N + '. E essa conversa vai ser a mais difícil — se você entrar sem preparo. Mulheres que chegam sem estratégia se perdem nas negativas e saem mais confusas do que entraram.';

  return (
    '<div class="upsell-block mb-14">' +
      '<div style="font-family:\'Roboto Mono\',monospace;font-size:0.58rem;color:var(--red);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:14px;">Próximo passo</div>' +
      '<div style="font-family:\'Manrope\',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);line-height:1.3;margin-bottom:12px;">Você tem as informações.<br>Agora precisa saber o que fazer com elas.</div>' +
      '<p style="font-size:0.85rem;color:var(--text-muted);line-height:1.7;margin-bottom:16px;">' + copy + '</p>' +
      '<div style="font-family:\'Manrope\',sans-serif;font-size:0.95rem;font-weight:700;color:var(--text);margin-bottom:10px;">Guia da Conversa Decisiva</div>' +
      '<ul class="upsell-checklist mb-20">' +
        '<li>As 7 perguntas que revelam a verdade mesmo quando ' + N + ' nega</li>' +
        '<li>Como identificar mentiras em tempo real pela linguagem corporal e verbal</li>' +
        '<li>O que fazer se ' + N + ' virar o jogo e te acusar de paranoia</li>' +
        '<li>Como sair da conversa com clareza — independente da resposta</li>' +
        '<li>Roteiro para 3 cenários: confissão, negação, dúvida</li>' +
      '</ul>' +
      '<div style="display:flex;align-items:baseline;gap:12px;justify-content:center;margin-bottom:16px;">' +
        '<span style="font-size:0.82rem;color:var(--text-muted);text-decoration:line-through;">R$ 47,00</span>' +
        '<span style="font-family:\'Manrope\',sans-serif;font-size:2rem;font-weight:800;color:var(--text);">R$ 27,00</span>' +
      '</div>' +
      '<a class="btn-cta mb-12" href="#">Quero o Guia da Conversa Decisiva</a>' +
      '<p style="font-size:0.7rem;color:var(--text-dim);text-align:center;">Acesso imediato &middot; PDF + áudio &middot; Garantia de 7 dias</p>' +
    '</div>'
  );
}

function buildButtons() {
  return (
    '<div style="display:flex;flex-direction:column;gap:10px;margin-bottom:20px;">' +
      '<button class="btn-secondary" onclick="window.print()">' +
        '<iconify-icon icon="lucide:printer" width="16" style="vertical-align:middle;margin-right:6px;"></iconify-icon>' +
        'Salvar dossiê em PDF' +
      '</button>' +
      '<button class="btn-secondary" onclick="window.location.href=\'upload.html\'">' +
        '<iconify-icon icon="lucide:refresh-cw" width="16" style="vertical-align:middle;margin-right:6px;"></iconify-icon>' +
        'Nova análise' +
      '</button>' +
    '</div>'
  );
}

function buildFooter() {
  return (
    '<div class="dossie-footer">' +
      'Raio-X do Traidor · Dossiê Confidencial · Protocolo #' + protocol + '<br>' +
      'Este relatório é gerado a partir de análise comportamental e padrões de reconhecimento digital. Os resultados têm caráter informativo. Não constituem prova jurídica e não substituem aconselhamento profissional.' +
    '</div>'
  );
}

// =================== RENDER ALL ===================
var wrap = document.getElementById('dossieWrap');
wrap.innerHTML =
  buildHeader() +
  buildScanReport() +
  buildEvidenciaGaleria() +
  buildSignals() +
  buildTop3() +
  buildProfile() +
  buildOtoBonus() +
  buildUpsellBlock() +
  buildButtons() +
  buildFooter();

// =================== TYPEWRITER ===================
var nameEl = document.getElementById('memberProfileName');
var underlineEl = document.getElementById('memberNameUnderline');
var twName = profile.name;
var ci = 0;

function typeChar() {
  if(ci < twName.length) {
    nameEl.textContent += twName[ci];
    ci++;
    setTimeout(typeChar, 75);
  } else {
    nameEl.classList.add('done');
    if(underlineEl) underlineEl.classList.add('grow');
  }
}
setTimeout(typeChar, 300);

// =================== RISK MARKER ===================
setTimeout(function(){
  var marker = document.getElementById('memberRiskMarker');
  if(marker) marker.style.left = profile.riskPct + '%';
}, 600);

})();
</script>
